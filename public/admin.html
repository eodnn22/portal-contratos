<!doctype html>
<html lang="pt-br">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Painel Admin</title>
  <link rel="stylesheet" href="/css/style.css">
  <script defer src="/js/app.js"></script>
</head>
<body>

<div class="card">
  <h2>Painel do Administrador</h2>

  <div id="msg" class="msg"></div>

  <p><strong>Bem-vindo, <span id="nomeAdmin"></span></strong></p>

  <hr>

  <h3>Usuários cadastrados</h3>
  <div id="listaUsuarios"></div>

  <br>

  <button id="btnSair" type="button">Sair</button>
</div>

<script>
document.addEventListener("DOMContentLoaded", async () => {
  const user = JSON.parse(localStorage.getItem("user"));
  if (!user) return window.location.href = "/login.html";

  document.getElementById("nomeAdmin").textContent = user.nome;

  try {
    const data = await apiFetch("/api/admin/usuarios");
    const lista = document.getElementById("listaUsuarios");

    lista.innerHTML = "";

    data.forEach(u => {
      const div = document.createElement("div");
      div.innerHTML = `
        <strong>${u.nome}</strong> - ${u.email} (${u.tipo})
      `;
      lista.appendChild(div);
    });

  } catch (e) {
    setMsg(e.message);
  }
});
</script>

</body>
</html>
