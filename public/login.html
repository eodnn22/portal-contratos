<!doctype html>
<html lang="pt-br">
<head>
  <meta charset="utf-8" />
  <title>Login</title>
  <link rel="stylesheet" href="/css/style.css">
  <script defer src="/js/app.js"></script>
</head>
<body>
  <div class="card">
    <h2>Login</h2>

    <div id="msg" class="msg"></div>

    <input id="email" class="input" placeholder="Email" />
    <input id="senha" class="input" placeholder="Senha" type="password" />

    <div class="row">
      <button onclick="entrar()">🔐 Entrar</button>
      <a class="btn" href="/register.html">➕ Criar conta</a>
    </div>
  </div>

<script>
  async function entrar() {
    setMsg('msg','');
    const email = document.getElementById('email').value.trim();
    const senha = document.getElementById('senha').value;

    try {
      const data = await apiFetch(`/api/auth/login`, { 'Content-Type':'application/json' },
        body: JSON.stringify({ email, senha })
      });

      localStorage.setItem('token', data.token);
      localStorage.setItem('usuario', JSON.stringify(data.usuario));

      if (data.usuario.tipo === 'admin') location.href = '/admin.html';
      else location.href = '/portal.html';
    } catch (e) {
      setMsg('msg', e.message || 'Erro ao logar');
    }
  }
</script>
</body>
</html>
