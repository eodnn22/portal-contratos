<!doctype html>
<html lang="pt-br">
<head>
  <meta charset="utf-8" />
  <title>Portal do Aluno</title>
  <link rel="stylesheet" href="/css/style.css">
  <script defer src="/js/app.js"></script>
</head>
<body>
  <div class="card">
    <h2>Portal do Aluno</h2>

    <div id="msg" class="msg"></div>

    <div class="small" style="margin-top:8px;">📄 Leia o contrato abaixo:</div>

    <div class="row" style="gap:10px; margin:8px 0;">
      <a id="btnAbrirContrato" class="btn" href="#" target="_blank" style="display:none;">📄 Abrir contrato</a>
      <a id="btnBaixarContrato" class="btn" href="#" download style="display:none;">⬇️ Baixar</a>
    </div>

    <div style="margin:8px 0;">
      <iframe id="contratoFrame"
              style="width:100%; height:320px; border:1px solid rgba(0,0,0,.15); border-radius:10px; background:#fff;"
              src="about:blank"></iframe>
    </div>

    <div class="small" style="margin-top:10px;">✍️ Assine abaixo:</div>

    <canvas id="canvas"
      width="700" height="260"
      style="width:100%; height:220px; background:#fff; border:1px solid rgba(0,0,0,.2); border-radius:10px; touch-action:none;"></canvas>

    <div class="row" style="gap:10px; margin-top:10px;">
      <button id="btnLimpar">🧹 Limpar</button>
      <button id="btnAssinar">💾 Assinar</button>
    </div>

    <div class="row" style="margin-top:10px;">
      <button class="danger" onclick="logout()">🚪 Sair</button>
    </div>
  </div>

<script>
  // garante que só ALUNO entra
  try { requireAluno(); } catch (e) {
    document.getElementById('msg').innerText = 'Erro: app.js não carregou.';
  }

  const msgEl = document.getElementById('msg');
  const frame = document.getElementById('contratoFrame');
  const btnAbrirContrato = document.getElementById('btnAbrirContrato');
  const btnBaixarContrato = document.getElementById('btnBaixarContrato');

  const canvas = document.getElementById('canvas');
  const ctx = canvas.getContext('2d');

  const btnLimpar = document.getElementById('btnLimpar');
  const btnAssinar = document.getElementById('btnAssinar');

  function setInfo(t){ msgEl.innerText = t || ''; }

  // -------- assinatura com POINTER EVENTS (mouse + touch) --------
  let drawing = false;

  function getPosFromPointer(e){
    const rect = canvas.getBoundingClientRect();
    const x = (e.clientX - rect.left) * (canvas.width / rect.width);
    const y = (e.clientY - rect.top) * (canvas.height / rect.height);
    return { x, y };
  }

  canvas.addEventListener('pointerdown', (e) => {
    e.preventDefault();
    drawing = true;
    canvas.setPointerCapture(e.pointerId);
    const p = getPosFromPointer(e);
    ctx.beginPath();
    ctx.moveTo(p.x, p.y);
  });

  canvas.addEventListener('pointermove', (e) => {
    if(!drawing) return;
    e.preventDefault();
    const p = getPosFromPointer(e);
    ctx.lineTo(p.x, p.y);
    ctx.lineWidth = 3;
    ctx.lineCap = 'round';
    ctx.strokeStyle = '#000';
    ctx.stroke();
  });

  canvas.addEventListener('pointerup', (e) => {
    e.preventDefault();
    drawing = false;
  });

  canvas.addEventListener('pointercancel', () => drawing = false);

  function canvasTemDesenho() {
    // pega pixels e verifica se existe algo diferente do branco/transparente
    const img = ctx.getImageData(0, 0, canvas.width, canvas.height).data;
    for (let i = 3; i < img.length; i += 4) {
      // se alpha != 0, tem traço
      if (img[i] !== 0) return true;
    }
    return false;
  }

  btnLimpar.onclick = () => {
    ctx.clearRect(0,0,canvas.width, canvas.height);
    setInfo('');
  };

  async function carregarStatus(){
    setInfo('Carregando contrato...');
    btnAssinar.disabled = true;
    btnAbrirContrato.style.display = 'none';
    btnBaixarContrato.style.display = 'none';
    frame.src = 'about:blank';

    try{
      const s = await apiFetch(`${API}/api/me/status-contrato`);

      console.log('STATUS CONTRATO ->', s);

      // contrato
      if (s.contratoUrl) {
        frame.src = s.contratoUrl;

        btnAbrirContrato.href = s.contratoUrl;
        btnBaixarContrato.href = s.contratoUrl;
        btnAbrirContrato.style.display = 'inline-block';
        btnBaixarContrato.style.display = 'inline-block';
      } else {
        setInfo('⚠️ Ainda não existe contrato anexado para sua conta. Peça para o admin anexar no seu usuário.');
        return;
      }

      // assinatura
      if (s.assinaturaUrl) {
        setInfo('✅ Você já assinou. Se precisar assinar de novo, peça para o admin liberar.');
        btnAssinar.disabled = true;
      } else {
        setInfo('Assine no quadro e clique em “Assinar”.');
        btnAssinar.disabled = false;
      }
    } catch(e){
      console.log(e);
      setInfo(e.message || 'Erro ao carregar contrato.');
    }
  }

  btnAssinar.onclick = async () => {
    if (!canvasTemDesenho()) {
      setInfo('Assine primeiro (desenhe no quadro).');
      return;
    }

    const dataUrl = canvas.toDataURL('image/png');

    setInfo('Enviando assinatura...');
    try{
      const r = await apiFetch(`${API}/api/me/assinar`, {
        method: 'POST',
        headers: { 'Content-Type':'application/json' },
        body: JSON.stringify({ dataUrl })
      });

      setInfo(r.mensagem || 'Assinado ✅');
      btnAssinar.disabled = true;
    } catch(e){
      console.log(e);
      setInfo(e.message || 'Erro ao assinar.');
    }
  };

  window.onload = carregarStatus;
</script>
</body>
</html>
