<!doctype html>
<html lang="pt-br">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Portal do Aluno</title>
  <link rel="stylesheet" href="/css/style.css">
  <script defer src="/js/app.js"></script>
</head>
<body>

<div class="card">
  <h2>Portal do Aluno</h2>

  <div id="msg" class="msg"></div>

  <p><strong>Bem-vindo, <span id="nomeAluno"></span></strong></p>

  <hr>

  <h3>Contrato</h3>
  <div id="contratoBox">
    Carregando contrato...
  </div>

  <br>

  <button id="btnSair" type="button">Sair</button>
</div>

<script>
document.addEventListener("DOMContentLoaded", async () => {
  const user = JSON.parse(localStorage.getItem("user"));
  if (!user) return window.location.href = "/login.html";

  document.getElementById("nomeAluno").textContent = user.nome;

  try {
    const data = await apiFetch("/api/aluno/contrato");

    document.getElementById("contratoBox").innerHTML =
      `<pre>${data.contrato}</pre>`;

  } catch (e) {
    document.getElementById("contratoBox").innerHTML =
      "Nenhum contrato disponível.";
  }
});
</script>

</body>
</html>
