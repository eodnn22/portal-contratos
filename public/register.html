<!doctype html>
<html lang="pt-br">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Criar conta</title>

  <link rel="stylesheet" href="/css/style.css" />
  <script defer src="/js/app.js?v=3"></script>
</head>

<body>
  <div class="card">
    <h2>Criar conta</h2>

    <div id="msg" class="msg" style="display:none;"></div>

    <input id="nome" class="input" placeholder="Nome" autocomplete="name" />
    <input id="email" class="input" placeholder="Email" type="email" autocomplete="email" />
    <input id="cpf" class="input" placeholder="CPF (apenas números)" inputmode="numeric" />
    <input id="senha" class="input" placeholder="Senha" type="password" autocomplete="new-password" />

    <!-- Se você não quiser escolher tipo, pode remover esse select.
         O app.js manda "aluno" por padrão se não existir. -->
    <select id="tipo" class="input">
      <option value="aluno" selected>Aluno</option>
      <option value="admin">Admin</option>
    </select>

    <div class="row">
      <button type="button" onclick="cadastrar()">✅ Cadastrar</button>
      <a class="link" href="/login.html">👤 Já tenho conta</a>
    </div>
  </div>
</body>
</html>
