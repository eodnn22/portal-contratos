<!doctype html>
<html lang="pt-br">
<head>
  <meta charset="utf-8" />
  <title>Criar conta</title>
  <link rel="stylesheet" href="/css/style.css">
  <script defer src="/js/app.js"></script>
</head>
<body>
  <div class="card">
    <h2>Criar conta</h2>

    <div id="msg" class="msg"></div>

    <input id="nome" class="input" placeholder="Nome" />
    <input id="email" class="input" placeholder="Email" />
    <input id="cpf" class="input" placeholder="CPF (opcional)" />
    <input id="senha" class="input" placeholder="Senha" type="password" />

    <div class="row">
      <button onclick="cadastrar()">✅ Cadastrar</button>
      <a class="btn" href="/login.html">👤 Já tenho conta</a>
    </div>
  </div>

<script>
  async function cadastrar() {
    setMsg('msg','');
    const nome = document.getElementById('nome').value.trim();
    const email = document.getElementById('email').value.trim();
    const cpf = document.getElementById('cpf').value.trim();
    const senha = document.getElementById('senha').value;

    try {
      const data = await apiFetch(`${API}/api/auth/register`, {
        method: 'POST',
        headers: { 'Content-Type':'application/json' },
        body: JSON.stringify({ nome, email, cpf, senha, tipo: 'aluno' })
      });

      setMsg('msg', data.mensagem || 'Conta criada ✅');
      setTimeout(() => location.href = '/login.html', 700);
    } catch (e) {
      setMsg('msg', e.message || 'Erro ao cadastrar');
    }
  }
</script>
</body>
</html>
